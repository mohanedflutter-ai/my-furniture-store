<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>برنامج المشتريات | غوانزو</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #d35400;
            --bg: #f4f7f6;
        }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; max-width: 1200px; margin: 10px auto; }
        .product-card { background: #fff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); cursor: pointer; }
        .card-img { width: 100%; height: 150px; object-fit: cover; background: #eee; }
        .card-content { padding: 8px; }
        .modal { display: none; position: fixed; z-index: 2000; top: 0; left: 0; width: 100%; height: 100%; background: #000; }
        .modal-content { background: #fff; width: 100%; height: 100%; overflow-y: auto; position: relative; }
        .slider-wrapper { position: relative; width: 100%; height: 60vh; background: #eee; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        .slider-img { max-width: 100%; max-height: 100%; object-fit: contain; display: none; }
        .slider-img.active { display: block; }
        .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.8); border: none; width: 40px; height: 40px; border-radius: 50%; font-size: 20px; z-index: 10; }
        .prev { right: 10px; } .next { left: 10px; }
        .close-modal { position: absolute; top: 15px; left: 15px; z-index: 2100; background: #fff; border: none; width: 35px; height: 35px; border-radius: 50%; font-weight: bold; }
        .details-container { padding: 15px; }
        .total-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 5px; background: var(--primary); color: white; padding: 10px; border-radius: 10px; text-align: center; }
        .total-item span { font-weight: bold; display: block; font-size: 0.9em; }
        .loader { text-align: center; padding: 50px; }
    </style>
</head>
<body>

    <div id="loader" class="loader">جاري جلب الصور... 🖼️</div>
    <div id="products-grid" class="products-grid"></div>

    <div id="productModal" class="modal">
        <div class="modal-content">
            <button class="close-modal" onclick="closeModal()">✕</button>
            <div class="slider-wrapper" id="sliderWrapper">
                <button class="nav-btn prev" onclick="changeSlide(1)">❯</button>
                <button class="nav-btn next" onclick="changeSlide(-1)">❮</button>
            </div>
            <div class="details-container">
                <h2 id="modalTitle" style="margin-bottom:5px;"></h2>
                <div id="modalShop" style="color:var(--accent); font-weight:bold; margin-bottom:15px;"></div>
                <div class="total-grid">
                    <div class="total-item"><small>سوداني</small><span id="tSDG"></span></div>
                    <div class="total-item" style="border-right:1px solid #444"><small>دولار</small><span id="tUSD"></span></div>
                    <div class="total-item" style="border-right:1px solid #444"><small>يوان</small><span id="tCNY"></span></div>
                </div>
                <div id="modalInfo" style="margin-top:15px; border-top:1px solid #eee; padding-top:10px; font-size:0.9em;"></div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbzjDA6QU4S4HE-p1GeH3ebqM0vjzSDVU9mcUPBlG1_giU1WCyaoqnhc2LyrTuDnCCVc2A/exec';
        let currentSlide = 0, slideImages = [];

        function getImageUrl(link) {
            if (!link) return 'https://via.placeholder.com/600x400?text=No+Image';
            let idMatch = link.match(/id=([^&]+)/) || link.match(/\/d\/([^/]+)/);
            if (idMatch) {
                // رابط مباشر يتخطى مشاكل الكوكيز في الهواتف
                return `https://docs.google.com/uc?export=view&id=${idMatch[1]}`;
            }
            return link;
        }

        fetch(API_URL).then(res => res.json()).then(data => {
            document.getElementById('loader').style.display = 'none';
            const grid = document.getElementById('products-grid');
            const headers = Object.keys(data[0]);
            const findKey = (w) => headers.find(h => h.includes(w));

            data.reverse().forEach(item => {
                const name = item[findKey('اسم المنتج')];
                if (!name) return;
                const imgs = (item[findKey('صور المنتج')] || "").split(',');
                const priceSDG = Math.round((item[findKey('التكلفة بالجنيه')] || 0) * 1000);
                const card = document.createElement('div');
                card.className = 'product-card';
                card.onclick = () => openModal(item, headers);
                card.innerHTML = `<img class="card-img" src="${getImageUrl(imgs[0].trim())}" loading="lazy"><div class="card-content"><b>${name}</b><br><span style="color:red">${priceSDG.toLocaleString()} ج.س</span></div>`;
                grid.appendChild(card);
            });
        });

        function openModal(item, headers) {
            const findKey = (w) => headers.find(h => h.includes(w));
            slideImages = (item[findKey('صور المنتج')] || "").split(',').filter(s => s.trim() !== "");
            currentSlide = 0;
            const pSDG = parseFloat(item[findKey('التكلفة بالجنيه')] || 0), pUSD = parseFloat(item[findKey('التكلفة بالدولار')] || 0);
            const pCNY = parseFloat(item[findKey('يوان')] || 0), sUSD = parseFloat(item[findKey('شحن')] || 0);
            const totalUSD = pUSD + sUSD;
            const totalSDG = Math.round((totalUSD * (pUSD > 0 ? pSDG/pUSD : 0)) * 1000);

            document.getElementById('modalTitle').innerText = item[findKey('اسم المنتج')];
            document.getElementById('modalShop').innerText = "🏬 " + (item[findKey('المحل')] || "غير معروف");
            document.getElementById('tSDG').innerText = totalSDG.toLocaleString();
            document.getElementById('tUSD').innerText = "$" + totalUSD.toFixed(2);
            document.getElementById('tCNY').innerText = "¥" + pCNY.toLocaleString();
            document.getElementById('modalInfo').innerHTML = `<p><b>الماركة:</b> ${item[findKey('الماركة')] || '-'}</p><p><b>ملاحظات:</b> ${item[findKey('ملاحظات')] || 'لا توجد'}</p>`;
            setupSlider();
            document.getElementById('productModal').style.display = 'block';
        }

        function setupSlider() {
            const wrapper = document.getElementById('sliderWrapper');
            wrapper.querySelectorAll('.slider-img').forEach(i => i.remove());
            slideImages.forEach((link, idx) => {
                const img = document.createElement('img');
                img.src = getImageUrl(link.trim());
                img.className = `slider-img ${idx === 0 ? 'active' : ''}`;
                wrapper.appendChild(img);
            });
        }

        function changeSlide(n) {
            const imgs = document.querySelectorAll('.slider-img');
            if (imgs.length <= 1) return;
            imgs[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + n + imgs.length) % imgs.length;
            imgs[currentSlide].classList.add('active');
        }

        function closeModal() { document.getElementById('productModal').style.display = 'none'; }
    </script>
</body>
</html>
